<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECACH Admin — Fix Contrato</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0e14; color: #cbd5e1; font-family: monospace; padding: 24px; }
  h1 { color: #ff7a1a; margin-bottom: 6px; }
  .warn { color: #e8a504; font-size: 13px; margin-bottom: 24px; }
  .card { background: #121823; border: 1px solid #1f2a3a; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: #6b7a91; margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
  input { width: 100%; background: #0d1320; border: 1px solid #1f2a3a; color: #f5f7fa; padding: 10px 12px; border-radius: 6px; font-size: 14px; font-family: monospace; margin-bottom: 14px; }
  input:focus { outline: none; border-color: #ff7a1a; }
  button { background: #ff7a1a; color: #1a0e05; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; margin-top: 4px; }
  button.ghost { background: transparent; border: 1px solid #1f2a3a; color: #cbd5e1; margin-top: 8px; }
  .log { background: #060a10; border: 1px solid #1f2a3a; border-radius: 6px; padding: 14px; font-size: 12px; line-height: 1.8; min-height: 80px; white-space: pre-wrap; }
  .ok { color: #4ade80; } .err { color: #ff4d4d; } .info { color: #5b9dff; } .warn-txt { color: #e8a504; }
  #loginSection, #mainSection { display: none; }
  #loginSection.show, #mainSection.show { display: block; }
</style>
</head>
<body>
<h1>⚙️ ECACH Admin — Fix Contrato Aeroportuario</h1>
<p class="warn">⚠️ Herramienta temporal. Elimina este archivo después de usarlo.</p>

<div id="loginSection" class="card">
  <label>Contraseña de admin</label>
  <input type="password" id="passInput" placeholder="Tu contraseña de Firebase">
  <button onclick="doLogin()">Entrar como admin</button>
  <div class="log" id="loginLog">Esperando...</div>
</div>

<div id="mainSection">
  <div class="card">
    <label>UID del jugador afectado</label>
    <input type="text" id="targetUid" placeholder="UID del jugador">
    <button class="ghost" onclick="findContract()">🔍 Buscar contratos del jugador</button>
  </div>

  <div class="card">
    <label>ID del contrato a reparar (se rellena solo al buscar)</label>
    <input type="number" id="contractId" placeholder="Número ID del contrato">
    <button onclick="fixContract()">✅ Completar contrato y cancelar penalización</button>
  </div>

  <div class="card">
    <label>Log</label>
    <div class="log" id="mainLog">Esperando acción...</div>
  </div>
</div>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDkPNuiA8z5TqR5-xskuDN7mrjbN43bBjA",
    authDomain: "ecachlogistic.firebaseapp.com",
    projectId: "ecachlogistic",
    storageBucket: "ecachlogistic.firebasestorage.app",
    messagingSenderId: "795514188072",
    appId: "1:795514188072:web:c791a7b1f4dde88646a01d"
  });
  const auth = firebase.auth();
  const API = "https://ecachlogistic-production.up.railway.app";

  function log(msg, type = "info") {
    const el = document.getElementById("mainLog");
    const t = new Date().toLocaleTimeString("es-ES");
    el.innerHTML += `<span class="${type}">[${t}] ${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginSection").classList.remove("show");
      document.getElementById("mainSection").classList.add("show");
      log(`✅ Autenticado como ${user.email}`, "ok");
    } else {
      document.getElementById("loginSection").classList.add("show");
    }
  });

  async function doLogin() {
    const el = document.getElementById("loginLog");
    try {
      await auth.signInWithEmailAndPassword("nikelaitor@hotmail.com", document.getElementById("passInput").value);
      el.innerHTML = '<span class="ok">✅ Login correcto</span>';
    } catch(e) {
      el.innerHTML = `<span class="err">❌ ${e.message}</span>`;
    }
  }

  async function getToken() {
    return await auth.currentUser.getIdToken(true);
  }

  async function findContract() {
    const uid = document.getElementById("targetUid").value.trim();
    if (!uid) { log("⚠️ Introduce el UID del jugador", "warn-txt"); return; }
    log(`🔍 Buscando contratos para UID: ${uid}`, "info");
    try {
      const token = await getToken();
      const res = await fetch(`${API}/api/admin/contracts-by-uid/${encodeURIComponent(uid)}`, {
        headers: { "Authorization": "Bearer " + token }
      });
      const data = await res.json();
      if (!res.ok) { log(`❌ Error: ${data.error}`, "err"); return; }
      const contracts = data.contracts || [];
      if (contracts.length === 0) {
        log("⚠️ No se encontraron contratos para ese UID.", "warn-txt");
        log("Comprueba que el UID es correcto.", "warn-txt");
        return;
      }
      log(`✅ ${contracts.length} contrato(s) encontrado(s):`, "ok");
      contracts.forEach(c => {
        let trips = [];
        try { trips = JSON.parse(c.trips_json || "[]"); } catch(e) {}
        const done = trips.filter(t => t.status === "done").length;
        const total = c.trips || trips.length;
        log(`  ID: ${c.id} | ${c.airport_name} (${c.airport_city}) | estado: ${c.status} | viajes: ${done}/${total} | penalización: ${c.penalty_pending ? "SÍ ⚠️" : "no"}`, c.status === "taken" || c.status === "failed" ? "warn-txt" : "info");
        // Auto-rellenar el contrato más relevante (taken o failed)
        if (c.status === "taken" || c.status === "failed") {
          document.getElementById("contractId").value = c.id;
          log(`  → ID ${c.id} autoseleccionado para reparar`, "ok");
        }
      });
    } catch(e) {
      log("❌ Error: " + e.message, "err");
    }
  }

  async function fixContract() {
    const uid = document.getElementById("targetUid").value.trim();
    const contractId = document.getElementById("contractId").value.trim();
    if (!uid || !contractId) { log("⚠️ Rellena el UID y el ID del contrato", "warn-txt"); return; }
    log(`🔧 Reparando contrato ${contractId} para UID ${uid}...`, "info");
    try {
      const token = await getToken();
      const res = await fetch(`${API}/api/admin/fix-airport-contract`, {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ contractId: parseInt(contractId), targetUid: uid })
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        log(`✅ CONTRATO REPARADO CORRECTAMENTE`, "ok");
        log(`   Viajes totales: ${data.tripsFixed}`, "ok");
        log(`   Ya completados antes: ${data.alreadyDone}`, "ok");
        log(`   Completados ahora: ${data.newlyFixed}`, "ok");
        log(`   Penalización 5.000€: CANCELADA ✅`, "ok");
      } else {
        log(`❌ Error: ${data.error || JSON.stringify(data)}`, "err");
        if (data.owner) log(`   El contrato pertenece a uid: ${data.owner}`, "warn-txt");
      }
    } catch(e) {
      log("❌ Error: " + e.message, "err");
    }
  }
</script>
</body>
</html>
